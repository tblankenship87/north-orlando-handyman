<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — North Orlando Handyman</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100" style="background:#f0f2f5;">
  <div class="card shadow border-0" style="width:360px;">
    <div class="card-header text-white text-center py-4" style="background:#1a2744;">
      <div class="fs-1">🔧</div>
      <h5 class="mb-0 fw-bold">North Orlando Handyman</h5>
      <small class="opacity-75">Admin Portal</small>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control">
        </div>
        <div class="d-grid">
          <button class="btn text-white fw-bold" style="background:#f97316;">Log In</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
